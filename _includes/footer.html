<script>
  (function () {
    function isMenuOpen(target) {
      return target.classList.contains('in');
    }

    function setMenuOpen(button, target, open) {
      target.classList.add('collapse');
      target.classList.toggle('in', open);
      target.style.height = open ? 'auto' : '';
      button.classList.toggle('collapsed', !open);
      button.setAttribute('aria-expanded', String(open));
    }

    function toggleMenu(button) {
      var target = document.querySelector(button.getAttribute('data-target'));
      if (!target) return;
      setMenuOpen(button, target, !isMenuOpen(target));
    }

    if (window.jQuery && window.jQuery.fn && window.jQuery.fn.collapse) return;

    document.addEventListener('click', function (event) {
      var button = event.target;
      while (button && button !== document && !(button.classList && button.classList.contains('navbar-toggle'))) {
        button = button.parentNode;
      }
      if (!button || button === document || button.getAttribute('data-toggle') !== 'collapse') return;

      event.preventDefault();
      toggleMenu(button);
    });
  })();
</script>
<script>
  (function () {
    if (!('serviceWorker' in navigator) || window.location.protocol !== 'https:') return;

    window.addEventListener('load', function () {
      navigator.serviceWorker.register('/sw.js').then(function (registration) {
        return navigator.serviceWorker.ready.then(function () {
          var worker = navigator.serviceWorker.controller || registration.active;
          if (!worker) return;

          var loadedImages = Array.prototype.slice.call(document.images)
            .filter(function (image) { return image.complete && image.naturalWidth > 0; })
            .map(function (image) { return image.currentSrc || image.src; });

          worker.postMessage({ type: 'CACHE_IMAGES', urls: loadedImages });
        });
      }).catch(function () {
        // The site remains fully functional when browser caching is unavailable.
      });
    });
  })();
</script>
